name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: deploy/Dockerfile.backend
        push: true
        tags: ghcr.io/${{ github.repository }}/ivy-backend:latest,ghcr.io/${{ github.repository }}/ivy-backend:${{ github.ref_name }}
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: deploy/Dockerfile.frontend
        push: true
        tags: ghcr.io/${{ github.repository }}/ivy-frontend:latest,ghcr.io/${{ github.repository }}/ivy-frontend:${{ github.ref_name }}
