version: '3.8'

# For development, we only run the databases in Docker.
# Backend and frontend run locally via Cargo and npm.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ivy
      - POSTGRES_PASSWORD=ivy_secret
      - POSTGRES_DB=ivy
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/ivy_neo4j_secret
    volumes:
      - neo4j_data_dev:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data_dev:
  neo4j_data_dev:
